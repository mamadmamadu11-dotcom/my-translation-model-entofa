name: Download Model
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - run: pip install huggingface-hub
      - run: huggingface-cli download persiannlp/mt5-small-parsinlu-translation_en_fa --local-dir ./model
      - uses: actions/upload-artifact@v4
        with:
          name: model
          path: ./model

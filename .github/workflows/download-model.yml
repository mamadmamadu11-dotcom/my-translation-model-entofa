name: Download Model and Split into 10MB Chunks
on: workflow_dispatch
jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install
      
      - name: Clone model repository
        run: |
          git clone https://huggingface.co/persiannlp/mt5-small-parsinlu-translation_en_fa ./model
          cd ./model
          git lfs pull
      
      - name: Find and split main model file into 10MB chunks
        run: |
          cd ./model
          
          # پیدا کردن فایل بزرگ (وزن‌های مدل)
          MAIN_FILE=$(find . -type f -size +50M | head -1)
          if [ -z "$MAIN_FILE" ]; then
            echo "ERROR: No large model file found!"
            exit 1
          fi
          
          echo "Splitting file: $MAIN_FILE"
          ORIGINAL_SIZE=$(ls -lh "$MAIN_FILE" | awk '{print $5}')
          echo "Original size: $ORIGINAL_SIZE"
          
          # ایجاد پوشه برای تکه‌ها
          mkdir -p ./chunks
          
          # نام فایل اصلی
          BASENAME=$(basename "$MAIN_FILE")
          
          # تقسیم به تکه‌های 10 مگابایتی (10 * 1024 * 1024 = 10485760 bytes)
          split -b 10485760 "$MAIN_FILE" ./chunks/"${BASENAME}.part."
          
          # شمارش تعداد تکه‌ها
          CHUNK_COUNT=$(ls -1 ./chunks/ | wc -l)
          echo "Created $CHUNK_COUNT chunks of 10MB each"
          
          # ذخیره اطلاعات برای بازسازی
          echo "$MAIN_FILE" > ./chunks/original_filename.txt
          echo "$CHUNK_COUNT" > ./chunks/total_chunks.txt
          
          # نمایش لیست تکه‌ها
          ls -lh ./chunks/
      
      - name: Upload each chunk as separate artifact
        run: |
          cd ./model/chunks
          
          # آپلود هر تکه به صورت جداگانه
          for CHUNK in *.part.*; do
            # استخراج شماره تکه
            CHUNK_NUMBER=$(echo "$CHUNK" | grep -oP 'part.\d+' | sed 's/part.//')
            
            # آپلود با استفاده از GitHub CLI
            echo "Uploading chunk $CHUNK_NUMBER: $CHUNK"
            
            # استفاده از curl برای آپلود (زیرا gh ممکن است نصب نباشد)
            curl -L \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary @"$CHUNK" \
              "https://uploads.github.com/repos/${{ github.repository }}/actions/artifacts/${CHUNK_NUMBER}/zip?name=chunk-${CHUNK_NUMBER}"
          done
      
      - name: Upload non-split files (config, tokenizer, etc.)
        uses: actions/upload-artifact@v4
        with:
          name: model-config-files
          path: |
            ./model/*.json
            ./model/*.model
            ./model/*.txt
            !./model/chunks/
          retention-days: 7

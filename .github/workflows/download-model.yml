name: Download and Create Separate 10MB Chunk ZIPs
on: workflow_dispatch
jobs:
  split-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install
      
      - name: Clone model repository
        run: |
          git clone https://huggingface.co/persiannlp/mt5-small-parsinlu-translation_en_fa ./model
          cd ./model
          git lfs pull
      
      - name: Split model into 10MB chunks and create individual ZIPs
        run: |
          cd ./model
          
          # پیدا کردن فایل اصلی مدل
          MAIN_FILE=$(find . -type f -size +50M | head -1)
          BASENAME=$(basename "$MAIN_FILE")
          
          echo "Splitting: $MAIN_FILE"
          
          # تقسیم به تکه‌های 10 مگابایتی
          mkdir -p ./chunks
          split -b 10485760 "$MAIN_FILE" ./chunks/chunk_
          
          # برای هر تکه، یک فایل zip جداگانه بساز
          cd ./chunks
          for CHUNK in chunk_*; do
            CHUNK_NUM=$(echo "$CHUNK" | sed 's/chunk_//')
            zip "${CHUNK_NUM}.zip" "$CHUNK"
            echo "Created: ${CHUNK_NUM}.zip"
          done
          
          # ذخیره اطلاعات بازسازی
          echo "$BASENAME" > original_name.txt
          ls -1 *.zip > zip_files_list.txt
      
      - name: Upload all chunk ZIPs as a single artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-10mb-chunks
          path: ./model/chunks/*.zip
          retention-days: 7

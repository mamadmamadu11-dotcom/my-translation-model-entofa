name: Split and Create Release
on: workflow_dispatch
jobs:
  split-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install
      
      - name: Clone and split
        run: |
          git clone https://huggingface.co/persiannlp/mt5-small-parsinlu-translation_en_fa ./model
          cd ./model
          git lfs pull
          
          MAIN_FILE=$(find . -type f -size +10M | head -1)
          mkdir -p chunks
          split -b 10485760 "$MAIN_FILE" chunks/chunk_
          
          cd chunks
          COUNTER=1
          for FILE in chunk_*; do
            mv "$FILE" "part_${COUNTER}.bin"
            COUNTER=$((COUNTER+1))
          done
          
          # ساخت zip برای هر تکه
          for i in $(seq 1 $((COUNTER-1))); do
            zip "part_${i}.zip" "part_${i}.bin"
          done
          
          echo "TOTAL=$((COUNTER-1))" >> $GITHUB_ENV
      
      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          name: "Model Chunks (10MB each)"
          tag_name: "chunks_$(date +'%Y%m%d_%H%M%S')"
          files: ./model/chunks/part_*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

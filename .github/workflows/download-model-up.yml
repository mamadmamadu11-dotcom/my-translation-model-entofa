name: Download Translation Model and Upload to Secure FTP

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create Local Upload Directory
        run: mkdir upload_me

      - name: Download Model Files from Hugging Face
        run: |
          echo "📥 در حال دانلود فایل‌های مدل از هاگینگ فیس..."
          curl -L -o upload_me/pytorch_model.bin "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/pytorch_model.bin?download=true"
          curl -L -o upload_me/source.spm "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/source.spm?download=true"
          curl -L -o upload_me/config.json "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/config.json?download=true"
          curl -L -o upload_me/generation_config.json "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/generation_config.json?download=true"

      - name: Create a Single ZIP Archive
        run: |
          cd upload_me
          zip -r translation-model.zip ./*
          cd ..
          echo "✅ فایل زیپ یکپارچه ساخته شد."

      - name: Upload Everything via Secure LFTP (SSL Enabled)
        run: |
          echo "⚙️ در حال نصب ابزار شبکه lftp..."
          sudo apt-get update && sudo apt-get install -y lftp
          
          echo "🚀 شروع آپلود امن با پروتکل FTPS..."
          
          lftp -d -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 2;
            open 185.128.139.57;
            user \"zabanplu\" \"*9G8i0zs\";
            mkdir -p translate-model;
            cd translate-model;
            mput ./upload_me/*;
            quit;
          "

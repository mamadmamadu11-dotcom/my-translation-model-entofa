name: Download Model and Upload via ASHX Chunked Bypass

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create Local Directory
        run: mkdir upload_me

      - name: Download Model Files from Hugging Face
        run: |
          echo "📥 در حال دانلود فایل‌های مدل از هاگینگ فیس..."
          curl -L -o upload_me/pytorch_model.bin "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/pytorch_model.bin?download=true"
          curl -L -o upload_me/source.spm "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/source.spm?download=true"
          curl -L -o upload_me/config.json "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/config.json?download=true"
          curl -L -o upload_me/generation_config.json "https://huggingface.co/Helsinki-NLP/opus-mt-en-af/resolve/main/generation_config.json?download=true"

      - name: Compress and Split into 25MB Chunks
        run: |
          cd upload_me
          # خرد کردن فایل زیپ به تکه‌های ۲۵ مگابایتی برای دور زدن محدودیت لایه وب هاست
          zip -r -s 25m ../translation-model.zip ./*
          cd ..
          echo "✅ فایل غول‌آسا به تکه‌های کوچک ۲۵ مگابایتی خرد شد:"
          ls -lh translation-model.*

      - name: Upload Chunks to Windows Host via HTTP POST
        run: |
          echo "🚀 شروع آپلود تکه‌تکه فایل‌ها به سرور ویندوز..."
          
          # اجرای حلقه برای آپلود تک‌تک بخش‌های تقسیم‌شده
          for file in translation-model.z* translation-model.zip; do
            if [ -f "$file" ]; then
              echo "📤 در حال ارسال تکه: $file ..."
              curl -X POST \
                -F "file=@$file" \
                "https://zaban-plus.ir/upload.ashx?token=ZabanPlusSecret123"
              echo -e "\n-----------------------------------"
            fi
          done

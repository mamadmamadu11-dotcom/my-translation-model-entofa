name: Split and Upload Large Artifact

on:
  workflow_dispatch:

jobs:
  split-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create a dummy file for testing
        run: |
          echo "Creating a 255MB dummy file for testing..."
          dd if=/dev/zero of=largefile.zip bs=1M count=255

      - name: Split into 10MB chunks
        run: |
          mkdir chunks
          cd chunks
          split -b 10m ../largefile.zip "chunk_"
          ls -lh

      - name: Upload chunks as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-chunks-10mb
          path: chunks/
          retention-days: 90
